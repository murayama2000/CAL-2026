        function toYmdLocal(dt) {
            const y = dt.getFullYear();
            const m = String(dt.getMonth() + 1).padStart(2, '0');
            const d = String(dt.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function getLastWorkdayDate(year, month) { // month: 1-12
            const lastDay = new Date(year, month, 0);
            for (let d = lastDay.getDate(); d > 0; d--) {
                const dt = new Date(year, month - 1, d);
                const key = toYmdLocal(dt);
                const dow = dt.getDay();
                if (dow !== 0 && dow !== 6 && !holidays.has(key)) {
                return dt; // Date を返す
                }
            }
            return null; // 全休の場合
        }


        function generateCalendar(startYear, startMonth, endYear, endMonth) {
            const calendarDiv = document.getElementById("calendar");
            calendarDiv.innerHTML = ''; // クリア

            for (let y = startYear; y <= endYear; y++) {
                for (let m = (y === startYear ? startMonth : 1); m <= (y === endYear ? endMonth : 12); m++) {
                    let lastWorkdayDate = getLastWorkdayDate(y, m);
                    console.log("month = " , m , "lastWorkday = " ,lastWorkdayDate);
                    let firstDay = new Date(y, m - 1, 1);
                    let lastDay = new Date(y, m, 0);
                    
                    let table = document.createElement('table');
                    table.innerHTML = `<tr><th colspan="7">${y}年${m}月</th></tr>`;
                    table.innerHTML += "<tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr>";

                    let row = "<tr>";
                    for (let i = 0; i < firstDay.getDay(); i++) {
                        row += "<td></td>"; // 開始前の空白
                    }

            for (let day = 1; day <= lastDay.getDate(); day++) {
                const currentDateObj = new Date(y, m - 1, day);
                const currentDate = `${y}-${String(m).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

                const isHoliday = holidays.has(currentDate);

                const isLastWorkday =
                    lastWorkdayDate &&
                    currentDateObj.getFullYear() === lastWorkdayDate.getFullYear() &&
                    currentDateObj.getMonth() === lastWorkdayDate.getMonth() &&
                    currentDateObj.getDate() === lastWorkdayDate.getDate();

                row += `<td class="${isHoliday ? "holiday" : isLastWorkday ? "last-workday" : ""}">${day}</td>`;

                if (currentDateObj.getDay() === 6) {
                    row += "</tr><tr>"; // 土曜日なら改行
                }
            }


                    row += "</tr>"; // 最後の行を閉じる
                    table.innerHTML += row;
                    calendarDiv.appendChild(table);
                }
            }
        }
